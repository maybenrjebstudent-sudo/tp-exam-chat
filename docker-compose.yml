services:
  backend:
    build: ./backend
    container_name: chat-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: chat-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
