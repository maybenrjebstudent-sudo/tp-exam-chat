<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveChat · Temps Réel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --border:    #1f2d45;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --success:   #10b981;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --self-bg:   rgba(0, 229, 255, 0.07);
      --other-bg:  rgba(255,255,255,0.03);
      --radius:    12px;
      --mono:      'Space Mono', monospace;
      --sans:      'Sora', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ─── Background grid ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ──────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ─── Header ──────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
      50%       { opacity: .4; box-shadow: 0 0 16px var(--accent); }
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 1rem;
      letter-spacing: .08em;
      color: var(--accent);
    }

    .status-badge {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--success);
      border: 1px solid var(--success);
      border-radius: 20px;
      padding: 3px 10px;
      opacity: .8;
    }

    /* ─── Identity bar ────────────────────────────────── */
    .identity-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .identity-bar label {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      white-space: nowrap;
      font-family: var(--mono);
    }

    #pseudoInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
      max-width: 220px;
    }

    #pseudoInput:focus { border-color: var(--accent); }

    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      font-family: var(--mono);
    }

    /* ─── Messages area ───────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: var(--other-bg);
      animation: slideIn .25s ease;
      transition: border-color .2s;
    }

    .message:hover { border-color: var(--border); }

    .message.self {
      background: var(--self-bg);
      border-color: rgba(0,229,255,.12);
      flex-direction: row-reverse;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      font-family: var(--mono);
    }

    .message.self .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .msg-body {
      flex: 1;
      min-width: 0;
    }

    .message.self .msg-body { text-align: right; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .message.self .msg-meta { flex-direction: row-reverse; }

    .msg-author {
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      font-family: var(--mono);
    }

    .message.self .msg-author { color: var(--accent); }

    .msg-time {
      font-size: .65rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .msg-content {
      font-size: .88rem;
      line-height: 1.55;
      color: var(--text);
      word-break: break-word;
    }

    /* system message */
    .message.system {
      justify-content: center;
      background: transparent;
      border: none;
    }

    .message.system .msg-content {
      font-size: .75rem;
      color: var(--muted);
      font-family: var(--mono);
      text-align: center;
    }

    /* ─── Input bar ───────────────────────────────────── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 0 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #messageInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--sans);
      font-size: .9rem;
      outline: none;
      resize: none;
      height: 46px;
      line-height: 1.4;
      transition: border-color .2s, box-shadow .2s;
    }

    #messageInput::placeholder { color: var(--muted); }

    #messageInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,.08);
    }

    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 0 20px;
      height: 46px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: .78rem;
      font-weight: 700;
      color: #0b0f1a;
      letter-spacing: .06em;
      transition: background .2s, transform .1s, box-shadow .2s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }

    #sendBtn:hover {
      background: #33ecff;
      box-shadow: 0 0 20px rgba(0,229,255,.3);
    }

    #sendBtn:active { transform: scale(.97); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* ─── Refresh bar ─────────────────────────────────── */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      flex-shrink: 0;
    }

    .refresh-info {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--muted);
    }

    #refreshBtn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .65rem;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    #refreshBtn:hover { color: var(--accent); border-color: var(--accent); }

    /* ─── Empty state ─────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .8rem;
    }

    .empty-state .big { font-size: 2rem; }

    /* ─── Loader ──────────────────────────────────────── */
    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: .8rem;
      font-family: var(--mono);
      color: var(--text);
      z-index: 100;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: #ef4444; color: #ef4444; }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 500px) {
      .logo-text { font-size: .8rem; }
      #pseudoInput { max-width: 140px; }
      #sendBtn span { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">LIVE_CHAT</span>
    </div>
    <span class="status-badge" id="statusBadge">● CONNECTÉ</span>
  </header>

  <!-- Identity bar -->
  <div class="identity-bar">
    <label>Pseudo :</label>
    <input id="pseudoInput" type="text" placeholder="ton_pseudo" maxlength="30" autocomplete="off" />
    <div class="user-avatar" id="userAvatar">?</div>
  </div>

  <!-- Refresh bar -->
  <div class="refresh-bar">
    <span class="refresh-info" id="refreshInfo">Auto-refresh toutes les 4s</span>
    <button id="refreshBtn">⟳ Rafraîchir</button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="empty-state" id="emptyState">
      <span class="big">💬</span>
      <span>Aucun message pour l'instant.</span>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <input id="messageInput" type="text" placeholder="Écrire un message…" maxlength="500" autocomplete="off" />
    <button id="sendBtn">
      <span>ENVOYER</span>
      <span>↑</span>
    </button>
  </div>

</div>

<div id="toast"></div>

<script>
  // ── Config ───────────────────────────────────────────────

  const API_BASE = 'https://tp-exam-chat-gbao.onrender.com' ||  'http://localhost:3001';;
  const REFRESH_INTERVAL = 4000;

  // ── State ────────────────────────────────────────────────
  let lastCount = 0;
  let refreshTimer = null;

  // ── DOM refs ─────────────────────────────────────────────
  const pseudoInput   = document.getElementById('pseudoInput');
  const userAvatar    = document.getElementById('userAvatar');
  const messagesEl    = document.getElementById('messages');
  const emptyState    = document.getElementById('emptyState');
  const messageInput  = document.getElementById('messageInput');
  const sendBtn       = document.getElementById('sendBtn');
  const refreshBtn    = document.getElementById('refreshBtn');
  const refreshInfo   = document.getElementById('refreshInfo');
  const statusBadge   = document.getElementById('statusBadge');
  const toast         = document.getElementById('toast');

  // ── Utilities ────────────────────────────────────────────
  function initials(name) {
    return (name || '?').slice(0, 2).toUpperCase();
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = 'show' + (isError ? ' error' : '');
    setTimeout(() => { toast.className = ''; }, 2800);
  }

  function getPseudo() {
    return pseudoInput.value.trim() || 'Anonyme';
  }

  // ── Avatar update ─────────────────────────────────────────
  pseudoInput.addEventListener('input', () => {
    userAvatar.textContent = initials(pseudoInput.value) || '?';
  });

  // ── Render messages ───────────────────────────────────────
  function renderMessages(messages) {
    const pseudo = getPseudo();
    emptyState.style.display = messages.length ? 'none' : 'flex';

    // Only re-render if count changed
    if (messages.length === lastCount) return;
    lastCount = messages.length;

    // Keep scroll position or auto-scroll
    const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;

    messagesEl.innerHTML = '';

    messages.forEach(msg => {
      const isSelf   = msg.author === pseudo;
      const isSystem = msg.author === 'System';

      const div = document.createElement('div');
      div.className = 'message' + (isSelf ? ' self' : '') + (isSystem ? ' system' : '');

      if (isSystem) {
        div.innerHTML = `<div class="msg-body"><div class="msg-content">${escHtml(msg.content)}</div></div>`;
      } else {
        div.innerHTML = `
          <div class="msg-avatar">${initials(msg.author)}</div>
          <div class="msg-body">
            <div class="msg-meta">
              <span class="msg-author">${escHtml(msg.author)}</span>
              <span class="msg-time">${formatTime(msg.timestamp)}</span>
            </div>
            <div class="msg-content">${escHtml(msg.content)}</div>
          </div>`;
      }

      messagesEl.appendChild(div);
    });

    if (atBottom || messages.length <= 2) {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Fetch messages ────────────────────────────────────────
  async function fetchMessages(silent = false) {
    if (!silent) refreshBtn.innerHTML = '<span class="loader"></span>';
    try {
      const res  = await fetch(`${API_BASE}/api/messages`);
      const data = await res.json();
      if (data.success) {
        renderMessages(data.data);
        const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        refreshInfo.textContent = `Dernière mise à jour : ${now}`;
        statusBadge.textContent = '● CONNECTÉ';
        statusBadge.style.color = '';
      }
    } catch {
      statusBadge.textContent = '● HORS LIGNE';
      statusBadge.style.color = '#ef4444';
      if (!silent) showToast('Impossible de contacter le serveur', true);
    } finally {
      refreshBtn.innerHTML = '⟳ Rafraîchir';
    }
  }

  // ── Send message ──────────────────────────────────────────
  async function sendMessage() {
    const author  = getPseudo();
    const content = messageInput.value.trim();

    if (!content) { showToast('Écris un message !', true); return; }

    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="loader"></span>';

    try {
      const res = await fetch(`${API_BASE}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author, content })
      });
      const data = await res.json();

      if (data.success) {
        messageInput.value = '';
        lastCount = 0; // force re-render
        await fetchMessages(true);
      } else {
        showToast(data.error || 'Erreur lors de l\'envoi', true);
      }
    } catch {
      showToast('Impossible d\'envoyer le message', true);
    } finally {
      sendBtn.disabled = false;
      sendBtn.innerHTML = '<span>ENVOYER</span><span>↑</span>';
      messageInput.focus();
    }
  }

  // ── Events ────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  refreshBtn.addEventListener('click', () => {
    lastCount = 0;
    fetchMessages();
  });

  // ── Auto-refresh ──────────────────────────────────────────
  function startAutoRefresh() {
    refreshTimer = setInterval(() => fetchMessages(true), REFRESH_INTERVAL);
  }

  // ── Init ──────────────────────────────────────────────────
  fetchMessages();
  startAutoRefresh();
  pseudoInput.focus();
</script>
</body>
</html>
