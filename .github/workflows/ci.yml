name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # BUILD & TEST — Backend
  # ─────────────────────────────────────────────
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image (validation)
        run: docker build -t chat-backend:ci .

  # ─────────────────────────────────────────────
  # BUILD — Frontend
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          if [ ! -f frontend/index.html ]; then
            echo "❌ frontend/index.html manquant"
            exit 1
          fi
          echo "✅ frontend/index.html présent"

      - name: Build Docker image (validation)
        run: docker build -t chat-frontend:ci ./frontend

  # ─────────────────────────────────────────────
  # DEPLOY — Frontend → Vercel
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd frontend
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ─────────────────────────────────────────────
  # DEPLOY — Backend → Render
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -s -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            --fail \
            && echo "✅ Render deploy triggered" \
            || echo "⚠️  Render deploy hook failed (non-blocking)"
